<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Duckville | Admin Panel</title>
    <script>
        // If not authenticated, kick them out immediately
        if (localStorage.getItem('duckville_auth') !== 'true') {
            window.location.href = "index.html";
        }
    </script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding-top: 100px; }
        .box { border: 2px solid #59c13a; padding: 40px; display: inline-block; border-radius: 15px; }
        .logout { color: #ff4444; cursor: pointer; text-decoration: underline; margin-top: 20px; display: block; }
    </style>
</head>
<body>
    <div class="box">
        <h1 style="color: #8cff66;">WELCOME, ADMIN</h1>
        <p>Logged in as: Duckvillesmp@gmail.com</p>
        <a href="index.html" style="color: #fff;">← Back to Site</a>
        <span class="logout" onclick="logout()">Logout</span>
    </div>

    <script>
        function logout() {
            localStorage.removeItem('duckville_auth');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>

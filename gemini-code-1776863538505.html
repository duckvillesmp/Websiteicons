<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f7f6; }
        #auth-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 320px; text-align: center; }
        h2 { color: #333; margin-bottom: 24px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; margin-top: 12px; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        #status-msg { margin-top: 16px; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

    <div id="auth-container">
        <h2>Secure Login</h2>
        <input type="text" id="login-username" placeholder="Username">
        <input type="password" id="login-password" placeholder="Password">
        <button id="login-btn">Access System</button>
        <p id="status-msg"></p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script>
        // Your account details
        const MY_USER = "admin";
        const MY_PASS = "Alpha_2026_Secure";

        // This ensures the code waits until the library and button exist
        document.getElementById('login-btn').addEventListener('click', function() {
            const user = document.getElementById('login-username').value;
            const pass = document.getElementById('login-password').value;
            const status = document.getElementById('status-msg');

            // Set up the account in localStorage if it doesn't exist yet
            if (!localStorage.getItem(MY_USER)) {
                const initialHash = CryptoJS.SHA256(MY_PASS).toString();
                localStorage.setItem(MY_USER, initialHash);
            }

            const storedHash = localStorage.getItem(user);

            if (storedHash) {
                const inputHash = CryptoJS.SHA256(pass).toString();
                
                if (inputHash === storedHash) {
                    status.style.color = "green";
                    status.innerText = "Access Granted. Welcome!";
                    // Example: window.location.href = "https://google.com";
                } else {
                    status.style.color = "#dc2626";
                    status.innerText = "Invalid password.";
                }
            } else {
                status.style.color = "#dc2626";
                status.innerText = "Account not found.";
            }
        });
    </script>
</body>
</html>

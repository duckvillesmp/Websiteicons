<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckville SMP | Member Portal</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        #login-card { 
            background: #1e1e1e; 
            padding: 40px; 
            border-radius: 16px; 
            text-align: center; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
            width: 100%; 
            max-width: 350px; 
            border: 1px solid #333; 
        }
        h2 { color: #facc15; margin-bottom: 8px; font-size: 28px; }
        p { color: #888; margin-bottom: 30px; font-size: 14px; }
        #status { margin-top: 25px; font-weight: 600; min-height: 24px; font-size: 15px; }
    </style>
</head>
<body>

    <div id="login-card">
        <h2>Duckville SMP</h2>
        <p>Private Member Login</p>
        
        <div id="buttonDiv" style="display: flex; justify-content: center;"></div>
        
        <div id="status"></div>
    </div>

    <script>
        // --- WHITELIST ---
        // Only emails in this list can gain access.
        const ALLOWED_EMAILS = [
            "Duckvillesmp@gmail.com"
        ];

        function handleCredentialResponse(response) {
            // Decoding the Google JSON Web Token (JWT)
            const base64Url = response.credential.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const payload = JSON.parse(window.atob(base64));
            
            const userEmail = payload.email.toLowerCase(); // Ensure case-insensitivity
            const status = document.getElementById('status');

            // Check if the user is in our allowed list
            if (ALLOWED_EMAILS.map(e => e.toLowerCase()).includes(userEmail)) {
                status.style.color = "#4ade80";
                status.innerText = "Access Granted! Welcome, " + payload.given_name;
                
                // Store the login state locally for this browser session
                localStorage.setItem('duckville_auth', 'true');
                localStorage.setItem('duckville_user', userEmail);

                // You can add a redirect here if you have a members-only page:
                // setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
            } else {
                status.style.color = "#f87171";
                status.innerText = "Access Denied: Not on the whitelist.";
                
                // Clears the auto-selection so they can try another account
                google.accounts.id.disableAutoSelect();
            }
        }

        window.onload = function () {
            google.accounts.id.initialize({
                // Your unique Client ID from Google Cloud Console
                client_id: "801340317427-7egskcjpcfjtum51crmk82kj69o7c07n.apps.googleusercontent.com",
                callback: handleCredentialResponse,
                auto_select: false
            });

            google.accounts.id.renderButton(
                document.getElementById("buttonDiv"),
                { 
                    theme: "filled_blue", 
                    size: "large", 
                    shape: "pill",
                    width: 250 
                }
            );
        }
    </script>
</body>
</html>
